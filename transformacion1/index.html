<!DOCTYPE html>
<html lang="en">

<head>

    <title>Mobile UX Demo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Mobile UX Demo</h1>
        <button id="menuBtn">≡</button>
    </header>

    <nav id="menu">

            <li>Componentes</li>

            <button id="themeBtn">

    <!-- Archivo JavaScript -->
    <script src="script.js"></script>
